name: ANT AI Production APK Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is missing"
            exit 1
          fi

          echo "$KEYSTORE_BASE64" | base64 --decode > android_app/release.keystore

      - name: Build signed release APK
        run: |
          cd android_app

          chmod +x ./gradlew

          ./gradlew clean assembleRelease --no-daemon --stacktrace
        env:
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}

      - name: Verify APK exists
        run: |
          ls -la android_app/app/build/outputs/apk/release/

      - name: Rename APK
        run: |
          mkdir -p release-assets

          cp android_app/app/build/outputs/apk/release/*.apk \
          release-assets/ANT-AI-${{ github.ref_name }}.apk

      - name: Generate SHA256 checksum
        run: |
          cd release-assets
          sha256sum *.apk > SHA256SUMS.txt

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ANT AI ${{ github.ref_name }}
          body: |
            # ANT AI Production Release

            Version: ${{ github.ref_name }}

            Features:
            - Android production APK
            - Signed release build
            - SHA256 verification

            Install the APK from the assets below.
          files: |
            release-assets/*.apk
            release-assets/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
