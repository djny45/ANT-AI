name: ANT AI Android Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.x'

      - name: Build APK (assembleDebug)
        working-directory: android_app
        run: |
          # Prefer the Gradle wrapper if present, otherwise use the Gradle action's CLI
          if [ -x ./gradlew ]; then
            ./gradlew assembleDebug --no-daemon
          else
            gradle assembleDebug --no-daemon
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ANT-AI-debug-apk
          path: android_app/app/build/outputs/apk/debug/*.apk
