name: ANT AI Android Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip

      - name: Download Gradle CLI
        run: |
          GRADLE_VERSION=8.5.2
          curl -sSL https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip -o gradle.zip
          sudo unzip -q gradle.zip -d /opt/
          echo "GRADLE_HOME=/opt/gradle-${GRADLE_VERSION}" >> $GITHUB_ENV
          echo "PATH=/opt/gradle-${GRADLE_VERSION}/bin:$PATH" >> $GITHUB_ENV

      - name: Generate Gradle wrapper (if missing)
        run: |
          set -e
          cd android_app
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.5.2 --distribution-type bin
          fi

      - name: Ensure gradlew is executable
        run: |
          chmod +x android_app/gradlew || true

      - name: Build APK
        working-directory: android_app
        run: |
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ANT-AI-debug-apk
          path: android_app/app/build/outputs/apk/debug/*.apk